services:
  # Продакшн версия
  production:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    container_name: clean-project-prod
    restart: unless-stopped

  # Версия для разработки
  dev:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    container_name: clean-project-dev
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - NODE_ENV=development
    profiles:
      - dev

  # Nginx для статических файлов в разработке (опционально)
  nginx-dev:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    container_name: clean-project-nginx-dev
    profiles:
      - dev
    depends_on:
      - dev